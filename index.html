<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tempo 30 Zones Zürich</title>

  <!-- OpenLayers -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol/ol.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/ol/dist/ol.js"></script>

<script>
  // WFS vector source
    const vectorSource = new ol.source.Vector({
    format: new ol.format.GeoJSON(),

    url:
        'https://maps.zh.ch/wfs/OGDZHWFS?' +
        'SERVICE=WFS&' +
        'VERSION=1.1.0&' +
        'REQUEST=GetFeature&' +
        'TYPENAME=ms:ogd-0065_giszhpub_ogd_tempo_30_20_f&' +
        'OUTPUTFORMAT=application%2Fjson%3B%20subtype%3Dgeojson&' +
        'SRSNAME=EPSG:3857',

    strategy: ol.loadingstrategy.all
    });

    vectorSource.on('featuresloadend', () => {
    console.log('Features loaded');
    });

    vectorSource.on('featuresloaderror', (e) => {
    console.log('Loading error', e);
    });

  // Layer styling
  const vectorLayer = new ol.layer.Vector({
    source: vectorSource,

    style: new ol.style.Style({
      stroke: new ol.style.Stroke({
        color: '#b86716',
        width: 2
      }),

      fill: new ol.style.Fill({
        color: 'rgba(184,103,22,0.2)'
      })
    })
  });

  // Map
  const map = new ol.Map({
    target: 'map',

    layers: [
      new ol.layer.Tile({
        source: new ol.source.TileWMS({
          url: 'https://wms.zh.ch/OrthoRGBZHWMS',

          params: {
            'LAYERS': 'OrthoRGBZHWMS',
            'TILED': true,
            'VERSION': '1.3.0'
          },

          crossOrigin: 'anonymous'
        })
      }),

      vectorLayer
    ],

    view: new ol.View({
      center: ol.proj.fromLonLat([8.55, 47.37]), // Zürich
      zoom: 11
    })
  });
</script>

</body>
</html>
